<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareCaller Auto-Flagger</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style type="text/tailwindcss">
    @theme {
      --font-sans: 'Figtree', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    :root {
      --background: oklch(0.98 0.001 286);
      --foreground: oklch(0.141 0.005 285.823);
      --card: oklch(1 0 0);
      --primary: oklch(0.525 0.223 3.958);
      --secondary: oklch(0.95 0.002 286);
      --muted: oklch(0.93 0.003 286);
      --muted-foreground: oklch(0.50 0.016 285.938);
      --destructive: oklch(0.577 0.245 27.325);
      --border: oklch(0.88 0.004 286);
      --chart-1: oklch(0.55 0.17 155);
      --chart-2: oklch(0.50 0.16 150);
      --chart-3: oklch(0.45 0.14 149);
      --chart-4: oklch(0.60 0.12 50);
    }
    .dark {
      --background: oklch(0.10 0.005 286);
      --foreground: oklch(0.92 0.005 286);
      --card: oklch(0.14 0.005 286);
      --primary: oklch(0.65 0.22 4);
      --secondary: oklch(0.18 0.005 286);
      --muted: oklch(0.22 0.006 286);
      --muted-foreground: oklch(0.55 0.01 286);
      --destructive: oklch(0.65 0.22 25);
      --border: oklch(0.25 0.006 286);
      --chart-1: oklch(0.72 0.19 150);
      --chart-2: oklch(0.60 0.17 150);
      --chart-3: oklch(0.50 0.14 149);
      --chart-4: oklch(0.70 0.14 60);
    }
    * { box-sizing: border-box; }
    body { background: var(--background); color: var(--foreground); }
    .panel { background: var(--card); border: 1px solid var(--border); }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .bar-fill { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.35s ease-out both; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--secondary); }
    ::-webkit-scrollbar-thumb { background: var(--muted-foreground); }
  </style>
  <script>
    if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');
    else document.documentElement.classList.add('dark');
  </script>
</head>
<body class="min-h-screen font-sans text-sm" x-data="dashboard()" x-init="init()">

  <!-- STATUS BAR -->
  <header class="panel border-t-0 border-x-0 px-3 md:px-4 py-2 flex items-center justify-between text-xs overflow-x-auto" style="color: var(--muted-foreground)">
    <div class="flex items-center gap-2 mono shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4 shrink-0" style="color: var(--primary)">
        <path d="M16.5 3C19.538 3 22 5.5 22 9c0 7-7.5 11-10 12.5C9.5 20 2 16 2 9c0-3.5 2.462-6 5.5-6C9.36 3 11.048 3.695 12 4.628 12.952 3.695 14.64 3 16.5 3Zm-3.043 9.408L12 14.4l-1.457-1.992-1.2-1.637L8.2 12.3l-1.2 1.637H3.522A14.455 14.455 0 0 0 6 18.118L12 21.5l6-3.382c1.072-.768 1.835-1.476 2.478-2.218h-3.478l-1.2-1.637-1.2 1.637-1.457-1.992-.686-.937-.686.937L12 16l-1.457-1.992-1.086-1.483 1.086-1.483L12 9.05l1.457 1.992 1.086 1.483-1.086 1.483Z"/>
      </svg>
      <span class="font-bold" style="color: var(--foreground)">CARECALLER</span>
      <span style="color: var(--border)">│</span>
      <span>AUTOFLAGGER</span>
      <span class="hidden md:inline" style="color: var(--border)">│</span>
      <span class="hidden md:inline" x-show="stats" x-text="stats?.model?.toUpperCase() + ' depth=' + (stats?.model_params?.max_depth || '?')"></span>
      <span class="hidden lg:inline" style="color: var(--border)">│</span>
      <span class="hidden lg:inline" x-show="stats" x-text="stats?.feature_count + ' features'"></span>
      <span class="hidden md:inline" style="color: var(--border)">│</span>
      <span class="hidden md:inline" x-show="stats">thresh: <span style="color: var(--chart-4)" x-text="stats?.threshold?.toFixed(3)"></span></span>
    </div>
    <div class="flex items-center gap-3">
      <span class="w-1.5 h-1.5 rounded-full inline-block" style="background: var(--chart-1); animation: pulse 2s infinite"></span>
      <button @click="toggleTheme()" class="cursor-pointer hover:opacity-70 transition p-1" title="Toggle theme">
        <svg x-show="isDark" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        <svg x-show="!isDark" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
      </button>
    </div>
  </header>

  <div x-show="stats" class="max-w-[1400px] mx-auto px-3 py-3 space-y-3 fade-up">

    <!-- STATS GRID -->
    <div class="grid grid-cols-3 md:grid-cols-6 panel">
      <template x-for="(s, i) in [
        { label: 'CALLS', value: stats?.total_calls, color: '' },
        { label: 'FLAGGED', value: stats?.flagged_calls, sub: stats?.flagged_pct + '%', color: 'var(--destructive)' },
        { label: 'VAL F1', value: stats?.val_metrics?.f1?.toFixed(3), color: 'var(--chart-1)' },
        { label: 'PRECISION', value: stats?.val_metrics?.precision?.toFixed(3), color: '' },
        { label: 'RECALL', value: stats?.val_metrics?.recall?.toFixed(3), color: '' },
        { label: 'FEATURES', value: stats?.feature_count, color: '' },
      ]" :key="i">
        <div class="px-3 py-2.5" :style="i > 0 ? 'border-left: 1px solid var(--border)' : ''">
          <div class="text-[10px] uppercase tracking-widest mb-1" style="color: var(--muted-foreground)" x-text="s.label"></div>
          <div class="text-xl font-bold mono" :style="s.color ? 'color:' + s.color : ''" x-text="s.value"></div>
          <div x-show="s.sub" class="text-[10px] mono mt-0.5" style="color: var(--muted-foreground)" x-text="s.sub"></div>
        </div>
      </template>
    </div>

    <!-- MIDDLE ROW: 3 panels -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">

      <!-- CATEGORIES -->
      <div class="panel p-3">
        <div class="text-[10px] uppercase tracking-widest mb-3 font-semibold" style="color: var(--muted-foreground)">Issue Categories</div>
        <div class="space-y-2">
          <template x-for="[cat, count] in Object.entries(stats?.category_breakdown || {})" :key="cat">
            <div>
              <div class="flex justify-between text-xs mb-0.5">
                <span class="mono" style="color: var(--muted-foreground)" x-text="cat"></span>
                <span class="mono font-bold" x-text="count"></span>
              </div>
              <div class="h-1.5 w-full" style="background: var(--secondary)">
                <div class="h-full bar-fill" :style="'width:' + (count / (stats?.flagged_calls || 1) * 100) + '%; background:' + (cat === 'audio_issue' ? 'var(--chart-4)' : cat === 'elevenlabs' ? 'var(--primary)' : 'var(--chart-1)')"></div>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- OUTCOMES -->
      <div class="panel p-3">
        <div class="text-[10px] uppercase tracking-widest mb-3 font-semibold" style="color: var(--muted-foreground)">Outcomes
          <span class="ml-2 normal-case tracking-normal font-normal"><span style="color: var(--destructive)">&#9608;</span> flagged <span style="color: var(--muted-foreground); opacity: 0.4">&#9608;</span> total</span>
        </div>
        <div class="space-y-1.5">
          <template x-for="[outcome, data] in Object.entries(stats?.outcome_breakdown || {}).sort((a,b) => b[1].total - a[1].total)" :key="outcome">
            <div class="flex items-center gap-2 text-xs">
              <span class="w-20 truncate mono" style="color: var(--muted-foreground)" x-text="outcome"></span>
              <div class="flex-1 h-3 relative" style="background: var(--secondary)">
                <div class="h-full bar-fill absolute top-0 left-0" style="background: var(--muted-foreground); opacity: 0.3" :style="'width:' + (data.total / (stats?.total_calls || 1) * 100) + '%'"></div>
                <div class="h-full bar-fill absolute top-0 left-0 z-10" style="background: var(--destructive)" :style="'width:' + (data.flagged / (stats?.total_calls || 1) * 100) + '%'"></div>
              </div>
              <span class="w-12 text-right mono text-[11px]" style="color: var(--muted-foreground)" x-text="data.flagged + '/' + data.total"></span>
            </div>
          </template>
        </div>
      </div>

      <!-- HISTOGRAM -->
      <div class="panel p-3">
        <div class="text-[10px] uppercase tracking-widest mb-3 font-semibold" style="color: var(--muted-foreground)">Confidence Distribution</div>
        <div class="flex items-end gap-px h-28">
          <template x-for="(bin, i) in histogram" :key="i">
            <div class="flex-1 flex flex-col justify-end h-full relative group cursor-default"
              :title="bin.label + ': ' + bin.count + ' calls'">
              <div class="w-full transition-all duration-300"
                :style="'height:' + Math.max(bin.count > 0 ? 8 : 0, bin.count / maxBin * 100) + '%; background:' + (bin.midpoint >= (stats?.threshold || 0.35) ? 'var(--destructive)' : 'var(--chart-1)') + '; opacity: 0.75'">
              </div>
              <!-- threshold marker: only on the single bin that contains the threshold -->
              <div x-show="(stats?.threshold || 0.35) >= (bin.midpoint - 0.025) && (stats?.threshold || 0.35) < (bin.midpoint + 0.025)" class="absolute top-0 bottom-0 w-0.5" style="background: var(--primary); left: 50%; opacity: 0.9"></div>
            </div>
          </template>
        </div>
        <div class="flex justify-between text-[10px] mono mt-1.5 px-0.5" style="color: var(--muted-foreground)">
          <span>0</span>
          <span style="color: var(--primary)">t=<span x-text="(stats?.threshold || 0).toFixed(2)"></span></span>
          <span>1</span>
        </div>
      </div>
    </div>

    <!-- FEATURE IMPORTANCE -->
    <div class="panel p-3">
      <div class="text-[10px] uppercase tracking-widest mb-3 font-semibold" style="color: var(--muted-foreground)">Feature Importance</div>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-6">
        <template x-for="col in [0, 1, 2]" :key="col">
          <div class="space-y-0.5">
            <template x-for="(feat, j) in importance.slice(col * 10, col * 10 + 10)" :key="feat.feature">
              <div class="flex items-center gap-2 py-0.5">
                <span class="w-5 text-right text-[10px] mono shrink-0" style="color: var(--muted-foreground)" x-text="'#' + (col * 10 + j + 1)"></span>
                <span class="w-44 truncate text-xs" style="color: var(--muted-foreground)" x-text="feat.feature"></span>
                <div class="flex-1 h-1.5" style="background: var(--secondary)">
                  <div class="h-full bar-fill" style="background: var(--muted-foreground); opacity: 0.5"
                    :style="'width:' + (feat.importance / (importance[0]?.importance || 1) * 100) + '%'"></div>
                </div>
                <span class="w-10 text-right text-[10px] mono shrink-0" style="color: var(--muted-foreground)" x-text="feat.importance.toFixed(3)"></span>
              </div>
            </template>
          </div>
        </template>
      </div>
    </div>

    <!-- CALL LOG -->
    <div class="panel">
      <div class="flex items-center justify-between px-3 py-2" style="border-bottom: 1px solid var(--border)">
        <div class="text-[10px] uppercase tracking-widest font-semibold" style="color: var(--muted-foreground)">Call Log</div>
        <div class="flex items-center gap-1">
          <template x-for="s in ['all', 'train', 'val', 'test']" :key="s">
            <button @click="filterSplit = s; page = 1; loadCalls()"
              :style="filterSplit === s ? 'background: var(--muted); color: var(--foreground)' : 'color: var(--muted-foreground)'"
              class="px-2 py-0.5 text-[10px] mono uppercase cursor-pointer hover:opacity-80 transition" x-text="s"></button>
          </template>
          <span style="color: var(--border)">│</span>
          <button @click="flaggedOnly = !flaggedOnly; page = 1; loadCalls()"
            :style="flaggedOnly ? 'background: oklch(0.65 0.22 25 / 20%); color: var(--destructive)' : 'color: var(--muted-foreground)'"
            class="px-2 py-0.5 text-[10px] mono uppercase cursor-pointer hover:opacity-80 transition">● flagged</button>
        </div>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr style="border-bottom: 1px solid var(--border); color: var(--muted-foreground)" class="text-[10px] uppercase tracking-wider">
              <th class="text-left py-1.5 px-3 font-medium">Call ID</th>
              <th class="text-left py-1.5 px-3 font-medium">Outcome</th>
              <th class="text-right py-1.5 px-3 font-medium">Prob</th>
              <th class="text-center py-1.5 px-3 font-medium">Flag</th>
              <th class="text-left py-1.5 px-3 font-medium">Category</th>
              <th class="text-right py-1.5 px-3 font-medium">Dur</th>
              <th class="text-right py-1.5 px-3 font-medium">Comp</th>
              <th class="text-center py-1.5 px-3 font-medium">Split</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="(call, idx) in pagedCalls()" :key="call.call_id">
              <tr class="cursor-pointer transition-colors hover:!bg-[var(--muted)]"
                :style="idx % 2 === 0 ? '' : 'background: var(--secondary)'"
                style="border-bottom: 1px solid var(--border)"
                @click="window.location.href = '/call/' + call.call_id">
                <td class="py-1.5 px-3 mono text-[11px]" x-text="call.call_id.slice(0, 8)"></td>
                <td class="py-1.5 px-3">
                  <span class="inline-block px-1.5 py-px text-[10px] mono"
                    :style="{
                      completed: 'color: var(--chart-1); background: oklch(0.55 0.17 155 / 12%)',
                      incomplete: 'color: var(--chart-4); background: oklch(0.60 0.12 50 / 12%)',
                      opted_out: 'color: var(--muted-foreground); background: var(--secondary)',
                      escalated: 'color: var(--destructive); background: oklch(0.65 0.22 25 / 12%)',
                      wrong_number: 'color: var(--primary); background: oklch(0.65 0.22 4 / 12%)',
                      voicemail: 'color: var(--muted-foreground); background: var(--secondary)',
                      scheduled: 'color: var(--muted-foreground); background: var(--secondary)',
                    }[call.outcome]" x-text="call.outcome"></span>
                </td>
                <td class="py-1.5 px-3 text-right mono text-[11px]"
                  :style="call.probability >= (stats?.threshold || 0.35) ? 'color: var(--destructive)' : 'color: var(--muted-foreground)'"
                  x-text="(call.probability * 100).toFixed(1) + '%'"></td>
                <td class="py-1.5 px-3 text-center">
                  <span x-show="call.predicted_ticket" style="color: var(--destructive)" class="text-[10px]">&#11044;</span>
                  <span x-show="!call.predicted_ticket" style="color: var(--muted)" class="text-[10px]">&#9675;</span>
                </td>
                <td class="py-1.5 px-3 mono text-[10px]"
                  :style="{
                    audio_issue: 'color: var(--chart-4)',
                    elevenlabs: 'color: var(--primary)',
                    openai: 'color: var(--chart-1)',
                  }[call.predicted_category] || 'color: var(--muted-foreground)'"
                  x-text="call.predicted_category || '—'"></td>
                <td class="py-1.5 px-3 text-right mono text-[11px]" style="color: var(--muted-foreground)" x-text="call.call_duration + 's'"></td>
                <td class="py-1.5 px-3 text-right mono text-[11px]"
                  :style="call.response_completeness < 0.5 ? 'color: var(--chart-4)' : 'color: var(--muted-foreground)'"
                  x-text="(call.response_completeness * 100).toFixed(0) + '%'"></td>
                <td class="py-1.5 px-3 text-center mono text-[10px]" style="color: var(--muted-foreground)" x-text="call.split"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- PAGINATION -->
      <div class="flex items-center justify-between px-3 py-2 text-[10px] mono" style="border-top: 1px solid var(--border); color: var(--muted-foreground)">
        <span x-text="'Showing ' + ((page-1)*perPage+1) + '-' + Math.min(page*perPage, calls.length) + ' of ' + calls.length"></span>
        <div class="flex items-center gap-1">
          <button @click="page = Math.max(1, page-1)" :disabled="page === 1"
            class="px-2 py-0.5 cursor-pointer hover:opacity-70 disabled:opacity-30 transition"
            style="background: var(--secondary)">&#9664;</button>
          <template x-for="(p, pi) in pageNumbers()" :key="'p'+pi">
            <button @click="if(p !== '...') page = p"
              :style="p === page ? 'background: var(--muted); color: var(--foreground)' : ''"
              class="px-2 py-0.5 cursor-pointer hover:opacity-70 transition"
              :class="p === '...' ? 'cursor-default' : ''"
              x-text="p"></button>
          </template>
          <button @click="page = Math.min(totalPages(), page+1)" :disabled="page >= totalPages()"
            class="px-2 py-0.5 cursor-pointer hover:opacity-70 disabled:opacity-30 transition"
            style="background: var(--secondary)">&#9654;</button>
        </div>
      </div>
    </div>

  </div>

  <!-- LOADING -->
  <div x-show="!stats" class="flex items-center justify-center min-h-screen">
    <div class="text-center mono text-xs" style="color: var(--muted-foreground)">
      <div class="w-5 h-5 border-2 border-t-transparent rounded-full animate-spin mx-auto mb-3" style="border-color: var(--chart-1); border-top-color: transparent"></div>
      Loading...
    </div>
  </div>

  <script>
    function dashboard() {
      return {
        stats: null,
        calls: [],
        importance: [],
        histogram: [],
        maxBin: 1,
        filterSplit: 'all',
        flaggedOnly: false,
        isDark: document.documentElement.classList.contains('dark'),
        page: 1,
        perPage: 20,

        toggleTheme() {
          this.isDark = !this.isDark;
          document.documentElement.classList.toggle('dark', this.isDark);
          localStorage.setItem('theme', this.isDark ? 'dark' : 'light');
        },

        pagedCalls() {
          const start = (this.page - 1) * this.perPage;
          return this.calls.slice(start, start + this.perPage);
        },

        totalPages() {
          return Math.max(1, Math.ceil(this.calls.length / this.perPage));
        },

        pageNumbers() {
          const tp = this.totalPages();
          if (tp <= 7) return Array.from({length: tp}, (_, i) => i + 1);
          const p = this.page;
          // Always show: first, last, current, and neighbors of current
          const visible = new Set([1, tp, p, Math.max(1, p-1), Math.min(tp, p+1)]);
          const sorted = [...visible].sort((a, b) => a - b);
          const result = [];
          for (let i = 0; i < sorted.length; i++) {
            if (i > 0 && sorted[i] - sorted[i-1] > 1) result.push('...');
            result.push(sorted[i]);
          }
          return result;
        },

        async init() {
          const [statsRes, callsRes, impRes] = await Promise.all([
            fetch('/api/stats').then(r => r.json()),
            fetch('/api/calls').then(r => r.json()),
            fetch('/api/importance').then(r => r.json()),
          ]);
          this.stats = statsRes;
          this.calls = callsRes;
          this.importance = impRes;
          this.buildHistogram(callsRes);
        },

        async loadCalls() {
          const params = new URLSearchParams();
          if (this.filterSplit !== 'all') params.set('split', this.filterSplit);
          if (this.flaggedOnly) params.set('flagged_only', 'true');
          this.calls = await fetch('/api/calls?' + params).then(r => r.json());
          this.page = 1;
        },

        buildHistogram(calls) {
          const bins = Array.from({length: 20}, (_, i) => ({
            label: (i * 5) + '-' + ((i + 1) * 5) + '%',
            midpoint: (i * 5 + 2.5) / 100,
            count: 0,
          }));
          for (const c of calls) {
            const idx = Math.min(Math.floor(c.probability * 20), 19);
            bins[idx].count++;
          }
          this.maxBin = Math.max(...bins.map(b => b.count), 1);
          this.histogram = bins;
        },
      };
    }
  </script>
</body>
</html>
