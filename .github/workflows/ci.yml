name: CI — Test, Train & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: brew install libomp
      - uses: astral-sh/setup-uv@v5
      - run: uv python install
      - run: uv sync --dev
      - run: uv run pytest tests/ -v --tb=short -x

  build:
    name: Train Model & Export Static Site
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: brew install libomp
      - uses: astral-sh/setup-uv@v5
      - run: uv python install
      - run: uv sync

      - name: Run NLI extraction (must run before pipeline)
        run: uv run nli-extract

      - name: Run pipeline (extract → train → predict)
        run: uv run pipeline

      - name: Run stacking meta-learner
        run: uv run stack

      - name: Export static dashboard
        run: uv run export-static

      - name: Verify outputs
        run: |
          test -f outputs/submission.csv
          test -f outputs/submission_stacked.csv
          test -f models/model.pkl
          test -f models/config.json
          test -f models/meta_model.pkl
          test -f models/meta_config.json
          test -f dist/index.html
          test -f dist/dashboard.html
          test -f dist/call.html
          test -f dist/favicon.svg
          echo "All outputs verified"

      # --- Release model artifacts ---
      - name: Get model info
        id: info
        run: |
          python3 -c "
          import json
          c = json.load(open('models/config.json'))
          m = c.get('val_metrics', {})
          mc = json.load(open('models/meta_config.json')) if __import__('os').path.exists('models/meta_config.json') else {}
          print(f'model={mc.get(\"meta_features\") and \"Stacked NLI + LightGBM\" or c[\"best_model\"]}')
          print(f'threshold={mc.get(\"threshold\", c[\"threshold\"])}')
          print(f'features={len(c[\"columns\"])}')
          print(f'f1={m.get(\"f1\", \"?\")}')
          print(f'precision={m.get(\"precision\", \"?\")}')
          print(f'recall={m.get(\"recall\", \"?\")}')
          print(f'cv_f1={mc.get(\"cv_f1_mean\", c.get(\"cv_f1_mean\", \"?\"))} ± {mc.get(\"cv_f1_std\", c.get(\"cv_f1_std\", \"?\"))}')
          " >> "$GITHUB_OUTPUT"
          echo "tag=v$(date -u +%Y%m%d.%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag }}
          name: "Model ${{ steps.info.outputs.tag }}"
          body: |
            | Metric | Value |
            |--------|-------|
            | Val F1 | ${{ steps.info.outputs.f1 }} |
            | Precision | ${{ steps.info.outputs.precision }} |
            | Recall | ${{ steps.info.outputs.recall }} |
            | CV F1 | ${{ steps.info.outputs.cv_f1 }} |
            | Model | ${{ steps.info.outputs.model }} |
            | Features | ${{ steps.info.outputs.features }} |
            | Threshold | ${{ steps.info.outputs.threshold }} |

            **Dashboard:** [cc-autoflagger.pages.dev](https://cc-autoflagger.pages.dev)

            **Files:** `model.pkl`, `config.json`, `submission.csv`
          files: |
            models/model.pkl
            models/config.json
            outputs/submission.csv

      # --- Deploy to Cloudflare Pages ---
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=cc-autoflagger
